  <style>
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('file:///Library/Fonts/JetBrainsMono-VariableFont_wght.ttf');
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: 'Source Han Sans CN';
      src: url('file:///Library/Fonts/SourceHanSansCN-Light.otf');
      font-weight: 300;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #3a3a3a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      font-family: 'JetBrains Mono', 'Source Han Sans CN', monospace;
    }

    .container {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 24px;
    }

    /* 收据卡片 */
    .receipt {
      background: #fff;
      width: 380px;
      padding: 72px 28px;
      position: relative;
      font-family: 'JetBrains Mono', 'Source Han Sans CN', monospace;
      font-size: 15px;
      line-height: 2.0;
      color: #222;
      clip-path: polygon(
        0% 20px, 3.125% 0%, 6.25% 20px, 9.375% 0%, 12.5% 20px, 15.625% 0%, 18.75% 20px, 21.875% 0%, 25% 20px, 28.125% 0%, 31.25% 20px, 34.375% 0%, 37.5% 20px, 40.625% 0%, 43.75% 20px, 46.875% 0%, 50% 20px, 53.125% 0%, 56.25% 20px, 59.375% 0%, 62.5% 20px, 65.625% 0%, 68.75% 20px, 71.875% 0%, 75% 20px, 78.125% 0%, 81.25% 20px, 84.375% 0%, 87.5% 20px, 90.625% 0%, 93.75% 20px, 96.875% 0%, 100% 20px,
        100% calc(100% - 20px), 96.875% 100%, 93.75% calc(100% - 20px), 90.625% 100%, 87.5% calc(100% - 20px), 84.375% 100%, 81.25% calc(100% - 20px), 78.125% 100%, 75% calc(100% - 20px), 71.875% 100%, 68.75% calc(100% - 20px), 65.625% 100%, 62.5% calc(100% - 20px), 59.375% 100%, 56.25% calc(100% - 20px), 53.125% 100%, 50% calc(100% - 20px), 46.875% 100%, 43.75% calc(100% - 20px), 40.625% 100%, 37.5% calc(100% - 20px), 34.375% 100%, 31.25% calc(100% - 20px), 28.125% 100%, 25% calc(100% - 20px), 21.875% 100%, 18.75% calc(100% - 20px), 15.625% 100%, 12.5% calc(100% - 20px), 9.375% 100%, 6.25% calc(100% - 20px), 3.125% 100%, 0% calc(100% - 20px)
      );
    }

    /* 分隔线 - 统一单横线 */
    .separator {
      border: none;
      border-top: 1px solid #222;
      margin: 20px 0;
    }

    /* Logo */
    .logo {
      display: block;
      width: 280px;
      margin: 0 auto 24px;
    }

    /* 标题区域 */
    .title {
      text-align: center;
      font-size: 20px;
      font-weight: 300;
      margin-bottom: 4px;
      letter-spacing: 2px;
      font-family: 'Source Han Sans CN', sans-serif;
    }

    .date-range {
      text-align: center;
      font-size: 15px;
      margin-bottom: 2px;
    }

    .subtitle {
      text-align: center;
      font-size: 18px;
      font-weight: 300;
      margin-bottom: 8px;
      font-family: 'Source Han Sans CN', sans-serif;
    }

    /* 图片上传区域 */
    .image-section {
      margin: 24px 0;
    }

    .image-placeholder {
      width: 280px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      border: 2px dashed #999;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s;
    }

    .image-placeholder:hover {
      border-color: #555;
    }

    .image-placeholder.has-image {
      border: none;
      background: transparent;
    }

    .placeholder-text {
      font-size: 14px;
      color: #888;
      text-align: center;
      padding: 20px;
      pointer-events: none;
      font-family: 'Source Han Sans CN', sans-serif;
    }

    .preview-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      image-rendering: pixelated;
    }

    .preview-image.active {
      display: block;
    }

    .placeholder-text.hidden {
      display: none;
    }

    /* 收藏日期 */
    .visit-date {
      text-align: center;
      font-size: 15px;
      margin: 16px 0;
    }

    /* 底部文字 */
    .footer {
      font-size: 13px;
      line-height: 1.8;
      font-family: 'Source Han Sans CN', sans-serif;
    }

    .footer p {
      margin-bottom: 4px;
    }

    .footer .topic {
      font-weight: 700;
    }

    /* QR Code 区域 */
    .qr-section {
      text-align: center;
      margin: 28px 0 20px;
    }

    .qr-code {
      width: 280px;
      display: block;
      margin: 0 auto 12px;
    }

    .qr-text {
      font-size: 14px;
      line-height: 1.6;
      font-family: 'Source Han Sans CN', sans-serif;
    }

    /* 操作按钮 */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
      margin-top: 20px;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 300;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: opacity 0.2s;
      width: 140px;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-download {
      background: #db562f;
      color: #fff;
    }

    .btn-upload {
      background: #f5f5f5;
      color: #333;
      border: 2px solid #999;
    }

    /* 隐藏的 canvas 用于处理图片 */
    #hiddenCanvas {
      display: none;
    }

    /* 裁切弹窗 */
    .crop-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .crop-modal.active {
      display: flex;
    }

    .crop-container {
      background: #222;
      padding: 20px;
      border-radius: 8px;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .crop-title {
      color: #fff;
      font-size: 15px;
      font-family: 'Source Han Sans CN', sans-serif;
    }

    .crop-image-wrapper {
      position: relative;
      display: inline-block;
      overflow: hidden;
      cursor: crosshair;
      max-width: 70vw;
      max-height: 60vh;
    }

    .crop-image-wrapper img {
      display: block;
      max-width: 70vw;
      max-height: 60vh;
      user-select: none;
      -webkit-user-drag: none;
    }

    .crop-box {
      position: absolute;
      border: 2px solid #fff;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
      cursor: move;
      z-index: 10;
    }

    .crop-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 1px dashed rgba(255, 255, 255, 0.5);
      pointer-events: none;
    }

    .crop-actions {
      display: flex;
      gap: 12px;
    }

    .crop-actions .btn {
      padding: 10px 24px;
      font-size: 14px;
    }

    .btn-confirm {
      background: #db562f;
      color: #fff;
    }

    .btn-cancel {
      background: #555;
      color: #fff;
    }
  </style>
</head>

    <!-- 操作按钮 -->
    <div class="actions">
      <label class="btn btn-upload" for="uploadInput">上传图片</label>
      <button class="btn btn-download" id="downloadBtn">下载</button>
      <input type="file" id="uploadInput" accept="image/*" hidden>
    </div>
  </div>

  <!-- 隐藏的 canvas 用于半调处理 -->
  <canvas id="hiddenCanvas"></canvas>

  <!-- 裁切弹窗 -->
  <div class="crop-modal" id="cropModal">
    <div class="crop-container">
      <p class="crop-title">拖动选框选择 1:1 区域</p>
      <div class="crop-image-wrapper" id="cropWrapper">
        <img id="cropImage" src="" alt="裁切预览">
        <div class="crop-box" id="cropBox"></div>
      </div>
      <div class="crop-actions">
        <button class="btn btn-cancel" id="cropCancel">取消</button>
        <button class="btn btn-confirm" id="cropConfirm">确认裁切</button>
      </div>
    </div>
  </div>

  <script>
    const imageArea = document.getElementById('imageArea');
    const uploadInput = document.getElementById('uploadInput');
    const previewImage = document.getElementById('previewImage');
    const placeholderText = document.getElementById('placeholderText');
    const downloadBtn = document.getElementById('downloadBtn');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const ctx = hiddenCanvas.getContext('2d');

    // 裁切相关
    const cropModal = document.getElementById('cropModal');
    const cropWrapper = document.getElementById('cropWrapper');
    const cropImage = document.getElementById('cropImage');
    const cropBox = document.getElementById('cropBox');
    const cropConfirm = document.getElementById('cropConfirm');
    const cropCancel = document.getElementById('cropCancel');
    let originalImage = null;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let boxStart = { x: 0, y: 0 };

    // 点击图片区域触发上传
    imageArea.addEventListener('click', () => {
      uploadInput.click();
    });

    // 图片上传 - 显示裁切弹窗
    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          showCropModal(img);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // 显示裁切弹窗
    function showCropModal(img) {
      cropImage.src = img.src;
      cropModal.classList.add('active');

      // 等图片加载后初始化裁切框
      cropImage.onload = () => {
        initCropBox();
      };
    }

    // 初始化裁切框（居中，1:1，取较短边）
    function initCropBox() {
      const imgW = cropImage.naturalWidth;
      const imgH = cropImage.naturalHeight;
      const displayW = cropImage.clientWidth;
      const displayH = cropImage.clientHeight;

      // 计算显示尺寸
      const shortSide = Math.min(displayW, displayH);
      const boxSize = shortSide * 0.8;

      // 居中
      const left = (displayW - boxSize) / 2;
      const top = (displayH - boxSize) / 2;

      cropBox.style.width = boxSize + 'px';
      cropBox.style.height = boxSize + 'px';
      cropBox.style.left = left + 'px';
      cropBox.style.top = top + 'px';
    }

    // 裁切框拖动
    cropBox.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStart.x = e.clientX;
      dragStart.y = e.clientY;
      boxStart.x = parseInt(cropBox.style.left) || 0;
      boxStart.y = parseInt(cropBox.style.top) || 0;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const dx = e.clientX - dragStart.x;
      const dy = e.clientY - dragStart.y;

      let newX = boxStart.x + dx;
      let newY = boxStart.y + dy;

      // 限制在图片范围内
      const maxW = cropImage.clientWidth - cropBox.clientWidth;
      const maxH = cropImage.clientHeight - cropBox.clientHeight;
      newX = Math.max(0, Math.min(newX, maxW));
      newY = Math.max(0, Math.min(newY, maxH));

      cropBox.style.left = newX + 'px';
      cropBox.style.top = newY + 'px';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // 触摸支持
    cropBox.addEventListener('touchstart', (e) => {
      isDragging = true;
      const touch = e.touches[0];
      dragStart.x = touch.clientX;
      dragStart.y = touch.clientY;
      boxStart.x = parseInt(cropBox.style.left) || 0;
      boxStart.y = parseInt(cropBox.style.top) || 0;
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const touch = e.touches[0];

      const dx = touch.clientX - dragStart.x;
      const dy = touch.clientY - dragStart.y;

      let newX = boxStart.x + dx;
      let newY = boxStart.y + dy;

      const maxW = cropImage.clientWidth - cropBox.clientWidth;
      const maxH = cropImage.clientHeight - cropBox.clientHeight;
      newX = Math.max(0, Math.min(newX, maxW));
      newY = Math.max(0, Math.min(newY, maxH));

      cropBox.style.left = newX + 'px';
      cropBox.style.top = newY + 'px';
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchend', () => {
      isDragging = false;
    });

    // 取消裁切
    cropCancel.addEventListener('click', () => {
      cropModal.classList.remove('active');
      uploadInput.value = '';
    });

    // 确认裁切
    cropConfirm.addEventListener('click', () => {
      const displayW = cropImage.clientWidth;
      const displayH = cropImage.clientHeight;
      const naturalW = cropImage.naturalWidth;
      const naturalH = cropImage.naturalHeight;

      const scaleX = naturalW / displayW;
      const scaleY = naturalH / displayH;

      const boxX = parseInt(cropBox.style.left) * scaleX;
      const boxY = parseInt(cropBox.style.top) * scaleY;
      const boxW = cropBox.clientWidth * scaleX;
      const boxH = cropBox.clientHeight * scaleY;

      // 裁切并应用半调
      cropAndHalftone(boxX, boxY, boxW, boxH);

      cropModal.classList.remove('active');
    });

    // 裁切并应用半调效果
    function cropAndHalftone(sx, sy, sw, sh) {
      const size = 256;
      hiddenCanvas.width = size;
      hiddenCanvas.height = size;

      // 绘制裁切区域到正方形画布
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, size, size);
      ctx.drawImage(originalImage, sx, sy, sw, sh, 0, 0, size, size);

      const imageData = ctx.getImageData(0, 0, size, size);
      const data = imageData.data;

      // 转换为灰度
      for (let i = 0; i < data.length; i += 4) {
        const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
        data[i] = data[i + 1] = data[i + 2] = gray;
      }

      // Floyd-Steinberg 误差扩散抖动
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const idx = (y * size + x) * 4;
          const old = data[idx];
          const newVal = old < 128 ? 0 : 255;
          data[idx] = data[idx + 1] = data[idx + 2] = newVal;
          const error = old - newVal;

          if (x + 1 < size) data[(y * size + x + 1) * 4] += error * 7 / 16;
          if (y + 1 < size) {
            if (x - 1 >= 0) data[((y + 1) * size + x - 1) * 4] += error * 3 / 16;
            data[((y + 1) * size + x) * 4] += error * 5 / 16;
            if (x + 1 < size) data[((y + 1) * size + x + 1) * 4] += error * 1 / 16;
          }
        }
      }

      ctx.putImageData(imageData, 0, 0);

      // 显示处理后的图片
      previewImage.src = hiddenCanvas.toDataURL('image/png');
      previewImage.classList.add('active');
      placeholderText.classList.add('hidden');
      imageArea.classList.add('has-image');
    }

    // 下载 PNG
    downloadBtn.addEventListener('click', async () => {
      if (typeof html2canvas === 'undefined') {
        alert('html2canvas 未加载，请刷新页面重试');
        return;
      }

      const receipt = document.getElementById('receipt');
      const clone = receipt.cloneNode(true);
      clone.style.clipPath = 'none';
      clone.style.position = 'absolute';
      clone.style.left = '-9999px';
      clone.style.top = '0';

      document.body.appendChild(clone);

      try {
        html2canvas(clone, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff'
        }).then((canvas) => {
          document.body.removeChild(clone);
          const link = document.createElement('a');
          link.download = 'receipt.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        }).catch((err) => {
          document.body.removeChild(clone);
          console.error('下载失败:', err);
          alert('下载失败，请重试');
        });
      } catch (e) {
        document.body.removeChild(clone);
        console.error('html2canvas 调用失败:', e);
        alert('下载失败: ' + e.message);
      }
    });
  </script>
</body>
</html>
